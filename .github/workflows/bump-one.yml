name: Bump one package

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      kind:
        required: true
        type: string
      version:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  bump-one:
    runs-on: macos-latest
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_DEVELOPER: 1
      PACKAGE: ${{ inputs.package }}
      KIND: ${{ inputs.kind }}
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: Homebrew/actions/setup-homebrew@master

      - name: Configure git
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Resolve bump args
        id: resolve
        run: |
          set -euo pipefail

          TAP_NAME="${GITHUB_REPOSITORY#*/}"
          TAP="${GITHUB_REPOSITORY_OWNER}/${TAP_NAME#homebrew-}"
          echo "qualified=${TAP}/${PACKAGE}" >> "$GITHUB_OUTPUT"

          # For formulas with comma-separated versions (e.g. aseprite "tag,asset"),
          # resolve the URL and SHA so brew doesn't have to handle #{version.to_s.split}
          if [ "$KIND" = "formula" ]; then
            file="Formula/${PACKAGE}.rb"
          else
            file="Casks/${PACKAGE}.rb"
          fi

          if [ -f "$file" ] && grep -q 'version.to_s.split' "$file"; then
            echo "Formula uses split version — resolving URL and SHA"
            url_template=$(grep -m1 '^\s*url "' "$file" | sed 's/.*url "\(.*\)"/\1/')

            resolved="$url_template"
            resolved=$(echo "$resolved" | sed "s/#{version}/${VERSION}/g")

            if echo "$resolved" | grep -q '#{version'; then
              IFS=',' read -ra parts <<< "$VERSION"
              for i in "${!parts[@]}"; do
                resolved=$(echo "$resolved" | sed "s/#{version\.to_s\.split(\",\")\[$i\]}/${parts[$i]}/g")
              done
            fi

            if echo "$resolved" | grep -q '#{'; then
              echo "::error::Unresolved interpolation in URL: $resolved"
              exit 1
            fi

            echo "Downloading $resolved to compute SHA..."
            tmpfile=$(mktemp)
            curl -fsSL "$resolved" -o "$tmpfile"
            sha=$(shasum -a 256 "$tmpfile" | cut -d' ' -f1)
            rm -f "$tmpfile"

            echo "url=$resolved" >> "$GITHUB_OUTPUT"
            echo "sha=$sha" >> "$GITHUB_OUTPUT"
            echo "needs_url=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_url=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump with brew
        id: brew-bump
        env:
          QUALIFIED: ${{ steps.resolve.outputs.qualified }}
          NEEDS_URL: ${{ steps.resolve.outputs.needs_url }}
          RESOLVED_URL: ${{ steps.resolve.outputs.url }}
          RESOLVED_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail

          args=(--no-audit --no-browse --no-fork)

          if [ "$NEEDS_URL" = "true" ]; then
            args+=(--url="$RESOLVED_URL" --sha256="$RESOLVED_SHA")
          else
            args+=(--version="$VERSION")
          fi

          echo "::group::brew bump $QUALIFIED"
          if [ "$KIND" = "formula" ]; then
            output=$(brew bump-formula-pr "${args[@]}" "$QUALIFIED" 2>&1)
          else
            output=$(brew bump-cask-pr "${args[@]}" "$QUALIFIED" 2>&1)
          fi
          echo "$output"
          echo "::endgroup::"

          pr_url=$(echo "$output" | grep -oE 'https://github.com/[^/]+/[^/]+/pull/[0-9]+' | head -1)
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Trigger tests for PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.brew-bump.outputs.pr_url }}
        run: |
          set -euo pipefail
          pr_number=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          head_branch=$(gh pr view "$pr_number" --json headRefName -q .headRefName)
          echo "Triggering tests for $PR_URL on branch $head_branch"
          gh workflow run test.yml --ref "$head_branch"

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.brew-bump.outputs.pr_url }}
        run: |
          set -euo pipefail
          echo "Enabling auto-merge for $PR_URL"
          gh pr merge "$PR_URL" --auto --squash --delete-branch
