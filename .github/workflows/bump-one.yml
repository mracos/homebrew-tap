name: Bump one package

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      kind:
        required: true
        type: string
      version:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write
  statuses: write

jobs:
  bump-one:
    runs-on: macos-latest
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_DEVELOPER: 1
      PACKAGE: ${{ inputs.package }}
      KIND: ${{ inputs.kind }}
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: Homebrew/actions/setup-homebrew@main

      - name: Configure git
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Resolve package info
        id: resolve
        run: |
          set -euo pipefail
          TAP_NAME="${GITHUB_REPOSITORY#*/}"
          TAP="${GITHUB_REPOSITORY_OWNER}/${TAP_NAME#homebrew-}"
          echo "qualified=${TAP}/${PACKAGE}" >> "$GITHUB_OUTPUT"

          if [ "$KIND" = "formula" ]; then
            echo "file=Formula/${PACKAGE}.rb" >> "$GITHUB_OUTPUT"
          else
            echo "file=Casks/${PACKAGE}.rb" >> "$GITHUB_OUTPUT"
          fi

      - name: Clean stale branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # Delete leftover remote branches from previous failed bump attempts
          for pattern in "bump-${PACKAGE}-${VERSION}" "bump/${PACKAGE}/${VERSION}"; do
            git push origin --delete "$pattern" 2>/dev/null || true
          done
          # Close any orphaned PRs for this exact version
          gh pr list --search "${PACKAGE} ${VERSION} in:title" --state open --json number -q '.[].number' | \
            while read -r pr; do
              echo "Closing stale PR #${pr}"
              gh pr close "$pr" --delete-branch 2>/dev/null || true
            done

      - name: Bump with brew
        id: brew-bump
        continue-on-error: true
        env:
          QUALIFIED: ${{ steps.resolve.outputs.qualified }}
        run: |
          set -uo pipefail

          args=(--no-audit --no-browse --no-fork --version="$VERSION")

          echo "::group::brew bump $QUALIFIED"
          if [ "$KIND" = "formula" ]; then
            output=$(brew bump-formula-pr "${args[@]}" "$QUALIFIED" 2>&1) || rc=$?
          else
            output=$(brew bump-cask-pr "${args[@]}" "$QUALIFIED" 2>&1) || rc=$?
          fi
          echo "$output"
          echo "::endgroup::"

          if [ "${rc:-0}" -ne 0 ]; then
            echo "::warning::brew bump failed (exit ${rc}), will try manual bump"
            exit "$rc"
          fi

          pr_url=$(echo "$output" | grep -oE 'https://github.com/[^/]+/[^/]+/pull/[0-9]+' | head -1)
          if [ -z "$pr_url" ]; then
            echo "::error::brew bump succeeded but could not extract PR URL"
            exit 1
          fi
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Manual bump (fallback)
        if: steps.brew-bump.outcome == 'failure'
        id: manual-bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILE: ${{ steps.resolve.outputs.file }}
        run: |
          set -euo pipefail

          # Clean up any partial state from brew attempt
          git checkout master 2>/dev/null || true
          git clean -fd 2>/dev/null || true

          # Re-set auth after cleanup (brew bump can disrupt git credentials)
          git config "http.https://github.com/.extraheader" \
            "AUTHORIZATION: basic $(echo -n "x-access-token:${GH_TOKEN}" | base64)"

          branch="bump/${PACKAGE}/${VERSION}"

          # Delete stale remote branch from previous failed runs
          git push origin --delete "$branch" 2>/dev/null || true

          git checkout -b "$branch"

          ruby scripts/manual-bump.rb "$FILE" "$VERSION"

          git add "$FILE"
          git commit -m "${PACKAGE} ${VERSION}"
          git push -u origin "$branch"

          pr_url=$(gh pr create \
            --title "${PACKAGE} ${VERSION}" \
            --body "Bump ${PACKAGE} to ${VERSION}" \
            --base master)

          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Test formula
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.brew-bump.outputs.pr_url || steps.manual-bump.outputs.pr_url }}
        run: |
          set -uo pipefail

          pr_number=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          head_sha=$(gh pr view "$pr_number" --json headRefOid -q .headRefOid)
          pr_branch=$(gh pr view "$pr_number" --json headRefName -q .headRefName)

          # Ensure we're on the PR branch so brew reads the updated formula
          git fetch origin "$pr_branch"
          git checkout "$pr_branch"

          conclusion="success"
          summary=""

          # brew audit --online checks URLs which can fail transiently, so retry once
          echo "::group::brew audit"
          if ! audit_output=$(brew audit --online --git --skip-style "$PACKAGE" 2>&1); then
            echo "$audit_output"
            echo "::warning::brew audit failed, retrying in 10s..."
            sleep 10
            if ! audit_output=$(brew audit --online --git --skip-style "$PACKAGE" 2>&1); then
              conclusion="failure"
              summary="brew audit failed"
            fi
          fi
          echo "$audit_output"
          echo "::endgroup::"

          echo "::group::brew style"
          if ! style_output=$(brew style "$PACKAGE" 2>&1); then
            conclusion="failure"
            summary="${summary:+$summary; }brew style failed"
          fi
          echo "$style_output"
          echo "::endgroup::"

          [ "$conclusion" = "success" ] && summary="All checks passed"

          # Post commit status so branch protection is satisfied
          [ "$conclusion" = "success" ] && state="success" || state="failure"
          gh api "repos/${GITHUB_REPOSITORY}/statuses/$head_sha" \
            --method POST \
            -f state="$state" \
            -f context="test" \
            -f description="$summary for $PACKAGE $VERSION"

          if [ "$conclusion" = "failure" ]; then
            echo "::error::Tests failed: $summary"
            exit 1
          fi

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.brew-bump.outputs.pr_url || steps.manual-bump.outputs.pr_url }}
        run: |
          set -euo pipefail
          echo "Enabling auto-merge for $PR_URL"
          gh pr merge "$PR_URL" --auto --squash --delete-branch
