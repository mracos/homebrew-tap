name: Bump one package

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      kind:
        required: true
        type: string
      version:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  bump-one:
    runs-on: macos-latest
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_DEVELOPER: 1
      PACKAGE: ${{ inputs.package }}
      KIND: ${{ inputs.kind }}
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: Homebrew/actions/setup-homebrew@master

      - name: Configure git
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Bump with brew
        id: brew-bump
        continue-on-error: true
        run: |
          set -euo pipefail

          TAP_NAME="${GITHUB_REPOSITORY#*/}"
          TAP="${GITHUB_REPOSITORY_OWNER}/${TAP_NAME#homebrew-}"
          QUALIFIED="${TAP}/${PACKAGE}"

          echo "::group::brew bump $QUALIFIED to $VERSION"
          if [ "$KIND" = "formula" ]; then
            output=$(brew bump-formula-pr --no-audit --no-browse --no-fork --version="$VERSION" "$QUALIFIED" 2>&1)
          else
            output=$(brew bump-cask-pr --no-audit --no-browse --no-fork --version="$VERSION" "$QUALIFIED" 2>&1)
          fi
          echo "$output"
          echo "::endgroup::"

          pr_url=$(echo "$output" | grep -oE 'https://github.com/[^/]+/[^/]+/pull/[0-9]+' | head -1)
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Fallback bump
        id: fallback-bump
        if: steps.brew-bump.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "$KIND" = "cask" ]; then
            file="Casks/${PACKAGE}.rb"
          else
            file="Formula/${PACKAGE}.rb"
          fi

          echo "::group::Fallback bump $PACKAGE to $VERSION"
          ./script/bump-formula "$file" "$VERSION"
          echo "::endgroup::"

          git diff "$file"

          pr_url=$(./script/create-bump-pr "$file" "$PACKAGE" "$VERSION")
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Trigger tests for PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.brew-bump.outputs.pr_url || steps.fallback-bump.outputs.pr_url }}
        run: |
          set -euo pipefail
          pr_number=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          head_branch=$(gh pr view "$pr_number" --json headRefName -q .headRefName)
          echo "Triggering tests for $PR_URL on branch $head_branch"
          gh workflow run test.yml --ref "$head_branch"

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.brew-bump.outputs.pr_url || steps.fallback-bump.outputs.pr_url }}
        run: |
          set -euo pipefail
          echo "Enabling auto-merge for $PR_URL"
          gh pr merge "$PR_URL" --auto --squash --delete-branch
