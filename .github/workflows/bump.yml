name: Bump versions

on:
  workflow_dispatch:
  schedule:
    # "At 10:13 on Saturday."
    - cron: '13 10 * * 6'

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  discover:
    runs-on: macos-latest
    outputs:
      has_updates: ${{ steps.discover.outputs.has_updates }}
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: Homebrew/actions/setup-homebrew@master

      - name: Discover outdated packages
        id: discover
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_DEVELOPER: 1
        run: |
          set -euo pipefail

          if ! results=$(brew livecheck --tap="$GITHUB_REPOSITORY" --json); then
            echo "::error::brew livecheck failed"
            exit 1
          fi

          if ! echo "$results" | jq -e . >/dev/null 2>&1; then
            echo "::error::brew livecheck returned invalid JSON"
            echo "$results"
            exit 1
          fi

          echo "Livecheck output:"
          echo "$results" | jq .

          # Write summary table
          {
            echo "## Discovery"
            echo ""
            echo "| Package | Type | Result |"
            echo "|---------|------|--------|"
            echo "$results" | jq -r '.[] |
              (.formula // .cask // "unknown") as $name |
              (if .formula then "formula" else "cask" end) as $type |
              (
                if (.status // "") == "error" then
                  "❌ " + ((.messages // ["unknown error"])[0] | gsub("\\|"; "/"))
                elif (.status // "") == "skipped" then
                  "⏭️ skipped"
                elif .version.latest != .version.current then
                  "🆕 " + (.version.current // "?") + " → " + (.version.latest // "?")
                else
                  "✅ " + (.version.current // "?")
                end
              ) as $result |
              "| " + $name + " | " + $type + " | " + $result + " |"'
          } >> "$GITHUB_STEP_SUMMARY"

          # Build matrix of outdated packages
          matrix=$(echo "$results" | jq -c '[
            .[] |
            select(
              (.status // "") != "error" and
              (.status // "") != "skipped" and
              .version.latest != null and
              .version.current != null and
              .version.latest != .version.current
            ) |
            {
              package: (.formula // .cask),
              kind: (if .formula then "formula" else "cask" end),
              version: .version.latest
            } |
            select(.package != null and .version != "")
          ]')
          count=$(echo "$matrix" | jq 'length')

          errors=$(echo "$results" | jq '[.[] | select((.status // "") == "error")] | length')
          if [ "$errors" -gt 0 ]; then
            echo "::warning::$errors package(s) had livecheck errors"
          fi

          if [ "$count" -eq 0 ]; then
            echo "No outdated packages"
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
          else
            echo "Outdated packages: $count"
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          fi

  bump-one:
    needs: discover
    if: needs.discover.outputs.has_updates == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.matrix) }}
    uses: ./.github/workflows/bump-one.yml
    with:
      package: ${{ matrix.package }}
      kind: ${{ matrix.kind }}
      version: ${{ matrix.version }}
    secrets: inherit
