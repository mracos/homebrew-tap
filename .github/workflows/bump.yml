name: Bump versions

on:
  workflow_dispatch:
  schedule:
    # "At 10:13 on Saturday."
    - cron: '13 10 * * 6'

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  discover:
    runs-on: macos-latest
    outputs:
      has_updates: ${{ steps.discover.outputs.has_updates }}
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: Homebrew/actions/setup-homebrew@master

      - name: Discover outdated packages
        id: discover
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_DEVELOPER: 1
        run: |
          set -euo pipefail

          if ! outdated=$(brew livecheck --tap="$GITHUB_REPOSITORY" --newer-only --json 2>/dev/null); then
            echo "::error::brew livecheck failed"
            exit 1
          fi

          if ! echo "$outdated" | jq -e . >/dev/null; then
            echo "::error::brew livecheck returned invalid JSON"
            echo "$outdated"
            exit 1
          fi

          echo "Livecheck output:"
          echo "$outdated" | jq .

          matrix=$(echo "$outdated" | jq -c '[
            .[] |
            {
              package: (.formula // .cask),
              kind: (if (.formula // empty) != "" then "formula" else "cask" end),
              version: .version.latest
            } |
            select(.package != null and .version != null and .version != "")
          ]')
          count=$(echo "$matrix" | jq 'length')

          if [ "$count" -eq 0 ]; then
            echo "No outdated packages"
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
          else
            echo "Outdated packages: $count"
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          fi

  bump-one:
    needs: discover
    if: needs.discover.outputs.has_updates == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.matrix) }}
    uses: ./.github/workflows/bump-one.yml
    with:
      package: ${{ matrix.package }}
      kind: ${{ matrix.kind }}
      version: ${{ matrix.version }}
    secrets: inherit
